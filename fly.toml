# Fly.io deployment configuration for Kings Analytics backend
# Deploy with: fly launch (first time) or fly deploy (subsequent)
# Set secrets with: fly secrets set CANVAS_API_TOKEN=xxx DATABASE_URL=xxx CANVAS_API_URL=xxx

app = "kings-analytics-backend"
primary_region = "syd"

[build]
  dockerfile = "backend/Dockerfile"
  dockerfile_path = "backend/Dockerfile"

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/api/health"
    port = 8000
    timeout = "5s"
    type = "http"
