<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kings Track Gradeo</title>
    <style>
      :root {
        --bg: #f8fafc;
        --panel: #ffffff;
        --line: #e2e8f0;
        --text: #0f172a;
        --muted: #64748b;
        --brand: #2f4ac0;
        --brand-strong: #2040a8;
        --brand-soft: #dbe5ff;
        --good: #0f766e;
        --warn: #b45309;
        --idle: #94a3b8;
        --shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 360px;
        max-width: 392px;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, system-ui, sans-serif;
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      .shell {
        padding: 14px;
        display: grid;
        gap: 12px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .brand-mark {
        width: 32px;
        height: 32px;
        border-radius: 10px;
        background: var(--brand);
        color: #fff;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        font-weight: 700;
        flex-shrink: 0;
      }

      .brand-copy {
        min-width: 0;
      }

      .brand-title {
        font-size: 15px;
        font-weight: 600;
        line-height: 1.1;
      }

      .brand-subtitle {
        font-size: 12px;
        color: var(--muted);
        line-height: 1.2;
      }

      .view {
        display: none;
        gap: 12px;
      }

      .view.active {
        display: grid;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 14px;
        box-shadow: var(--shadow);
        display: grid;
        gap: 12px;
      }

      .panel.compact {
        gap: 10px;
      }

      .status-row,
      .panel-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .status-copy {
        min-width: 0;
        display: grid;
        gap: 4px;
      }

      .status-title {
        font-size: 17px;
        font-weight: 600;
        line-height: 1.15;
      }

      .status-detail,
      .home-note,
      .settings-note,
      .field-note {
        font-size: 12px;
        line-height: 1.45;
        color: var(--muted);
      }

      .panel-title {
        font-size: 16px;
        font-weight: 600;
        line-height: 1.2;
      }

      .panel-caption {
        font-size: 12px;
        color: var(--muted);
      }

      .status-chip {
        border-radius: 999px;
        padding: 5px 9px;
        font-size: 11px;
        font-weight: 600;
        color: #334155;
        background: #f1f5f9;
        border: 1px solid #e2e8f0;
        white-space: nowrap;
      }

      .status-chip.good {
        color: var(--good);
        background: #f0fdfa;
        border-color: #ccfbf1;
      }

      .status-chip.warn {
        color: var(--warn);
        background: #fffbeb;
        border-color: #fde68a;
      }

      .signal-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .signal {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        font-weight: 600;
        color: var(--muted);
      }

      .signal::before {
        content: "";
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: var(--idle);
        box-shadow: 0 0 0 3px rgba(148, 163, 184, 0.12);
      }

      .signal.good {
        color: #475569;
      }

      .signal.good::before {
        background: var(--good);
        box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.12);
      }

      .signal.warn {
        color: var(--warn);
      }

      .signal.warn::before {
        background: var(--warn);
        box-shadow: 0 0 0 3px rgba(180, 83, 9, 0.14);
      }

      .action-grid,
      .field-grid {
        display: grid;
        gap: 10px;
      }

      button {
        border: 0;
        border-radius: 12px;
        padding: 12px 13px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 120ms ease, border-color 120ms ease, opacity 120ms ease;
      }

      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .primary {
        background: var(--brand);
        color: #fff;
      }

      .primary:hover:not(:disabled) {
        background: var(--brand-strong);
      }

      .secondary {
        background: #fff;
        color: #334155;
        border: 1px solid var(--line);
      }

      .secondary:hover:not(:disabled) {
        background: #f8fafc;
      }

      .ghost {
        padding: 8px 10px;
        font-size: 12px;
        color: #334155;
        background: transparent;
        border: 1px solid transparent;
      }

      .ghost:hover:not(:disabled) {
        background: #eef2ff;
        border-color: #c7d2fe;
      }

      .action-button {
        text-align: left;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 12px;
        font-weight: 600;
        color: #334155;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        padding: 10px 12px;
        font-size: 12px;
        color: var(--text);
        background: #fff;
      }

      input:focus,
      textarea:focus {
        outline: none;
        border-color: #93c5fd;
        box-shadow: 0 0 0 3px rgba(59, 91, 219, 0.15);
      }

      textarea {
        min-height: 132px;
        resize: vertical;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        line-height: 1.45;
      }

      .settings-actions {
        display: flex;
        gap: 8px;
      }

      .settings-actions > button {
        flex: 1;
      }

      .notice {
        display: none;
        border-radius: 12px;
        padding: 10px 12px;
        font-size: 12px;
        font-weight: 600;
      }

      .notice.show {
        display: block;
      }

      .notice.good {
        color: var(--good);
        background: #f0fdfa;
      }

      .notice.warn {
        color: var(--warn);
        background: #fffbeb;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">K</div>
          <div class="brand-copy">
            <div class="brand-title">Kings Analytics</div>
            <div class="brand-subtitle">Gradeo</div>
          </div>
        </div>
        <button id="openSettings" class="ghost" type="button">Settings</button>
      </header>

      <div id="noticeBanner" class="notice"></div>

      <main id="homeView" class="view active">
        <section class="panel compact">
          <div class="status-row">
            <div class="status-copy">
              <h1 id="statusHeadline" class="status-title">Ready</h1>
              <p id="statusSummary" class="status-detail">No sync running.</p>
            </div>
            <div id="statePill" class="status-chip">Idle</div>
          </div>

          <div class="signal-row">
            <span id="configPill" class="signal">URL</span>
            <span id="authPill" class="signal">Key</span>
            <span id="headersPill" class="signal">Gradeo</span>
          </div>

          <p id="homeNote" class="home-note">Open Settings to connect.</p>
        </section>

        <section class="panel">
          <div class="panel-header">
            <div>
              <h2 class="panel-title">Sync</h2>
              <p class="panel-caption">Run the next step.</p>
            </div>
          </div>

          <div class="action-grid">
            <button id="syncClasses" class="primary action-button" type="button">Sync classes</button>
            <button id="syncStudents" class="primary action-button" type="button">Sync students</button>
            <button id="importMappedClasses" class="primary action-button" type="button">Import mapped classes</button>
          </div>
        </section>
      </main>

      <main id="settingsView" class="view">
        <section class="panel">
          <div class="panel-header">
            <div class="status-copy">
              <h1 class="panel-title">Settings</h1>
              <p class="settings-note">Save your connection details.</p>
            </div>
            <button id="closeSettings" class="secondary" type="button">Back</button>
          </div>

          <div class="signal-row">
            <span id="settingsConfigPill" class="signal">URL</span>
            <span id="settingsAuthPill" class="signal">Key</span>
            <span id="settingsHeadersPill" class="signal">Gradeo</span>
          </div>

          <p id="authDetail" class="field-note">Not connected.</p>

          <div class="field-grid">
            <label>
              API base URL
              <input id="apiBaseUrl" placeholder="https://kings-track.onrender.com/api" />
            </label>

            <label>
              Extension API key
              <input id="extensionApiKey" type="password" placeholder="ktx_..." />
            </label>

            <label>
              Gradeo headers
              <textarea id="gradeoApiHeadersJson" placeholder='{"Authorization":"Bearer ..."}'></textarea>
            </label>
          </div>

          <div class="settings-actions">
            <button id="saveSettings" class="primary" type="button">Save</button>
          </div>
        </section>
      </main>
    </div>

    <script src="../../vendor/webextension-polyfill.js"></script>
    <script src="../shared/config.js"></script>
    <script src="../shared/logger.js"></script>
    <script src="../shared/auth.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
